<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Mood Board</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --radius: 18px;
      --shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      --shadow-focus: 0 4px 24px rgba(0, 113, 227, 0.12);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      text-align: center;
      margin: 0 0 32px;
      font-weight: 400;
    }

    .composer {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    textarea {
      width: 100%;
      min-height: 108px;
      padding: 16px 18px;
      border: none;
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      font-family: inherit;
      font-size: 17px;
      line-height: 1.45;
      color: var(--text);
      resize: none;
      outline: none;
      transition: box-shadow 0.2s ease;
    }

    textarea::placeholder {
      color: #aeaeb2;
    }

    textarea:focus {
      box-shadow: var(--shadow-focus);
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 980px;
      background: var(--accent);
      color: #fff;
      font-size: 17px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.12s ease;
    }

    .btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .list {
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      position: relative;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 18px 16px;
      animation: cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
      transform: translateY(12px);
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:hover .del,
    .card:focus-within .del {
      opacity: 1;
    }

    .del {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 6px 10px;
      border: none;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.04);
      color: var(--text-secondary);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease, background 0.15s ease, color 0.15s ease;
    }

    .del:hover {
      background: rgba(0, 0, 0, 0.08);
      color: var(--text);
    }

    .mood-body {
      font-size: 17px;
      line-height: 1.5;
      word-break: break-word;
      padding-right: 56px;
    }

    .ai-block {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      min-height: 28px;
    }

    .ai-loading {
      font-size: 15px;
      color: var(--text-secondary);
      font-style: normal;
      letter-spacing: 0.01em;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    .ai-reply {
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
      font-weight: 450;
    }

    .ai-reply.tone-comfort {
      color: #64b5f6;
    }

    .ai-reply.tone-celebrate {
      color: #ff9500;
    }

    .ai-reply.tone-career {
      color: #ffd60a;
    }

    .ai-reply.tone-neutral {
      color: var(--text);
    }

    .meta {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .empty {
      text-align: center;
      color: var(--text-secondary);
      font-size: 15px;
      padding: 32px 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>My Mood Board</h1>
    <p class="subtitle">写下此刻，随机遇见一句回应</p>

    <form class="composer" id="moodForm" autocomplete="off">
      <textarea id="moodInput" maxlength="500" rows="4" placeholder="今天心情如何？" aria-label="心情输入"></textarea>
      <button type="submit" class="btn" id="postBtn">发布</button>
    </form>

    <div class="list" id="moodList" aria-live="polite"></div>
  </div>

  <script>
    (function () {
      'use strict';

      var STORAGE_KEY = 'moodboard_entries_v1';
      var LOADING_PHASE2_MS = 800;
      var LOADING_DONE_MS = 1500;

      var MSG_ANALYZE = '✨ 正在分析你的情绪...';
      var MSG_UNIVERSE = '🔮 正在向宇宙请求建议...';

      var NEGATIVE_KEYS = [
        '累',
        '加班',
        '哭',
        '难受',
        '丧',
        '烦',
        '煩',
        '抑郁',
        '崩溃',
        '压力',
        '难过',
        '痛苦',
        '绝望',
        '委屈',
        '焦虑',
        '心碎',
        '郁闷',
      ];

      var POSITIVE_KEYS = [
        '开心',
        '中奖',
        '爽',
        '好玩',
        '高兴',
        '快乐',
        '棒',
        '赞',
        '太好了',
        '哈哈',
        '耶',
        '幸福',
        '惊喜',
      ];

      var CAREER_KEYS = ['面试', '找工作', 'offer', '简历', '入职', '辞职', '跳槽', '职场', '薪资', '裁员'];

      var REPLIES_COMFORT = [
        '先深呼吸三次，你已经撑很久了，真的很不容易。',
        '难过的时候不必逞强，今晚允许自己早点休息。',
        '情绪没有对错，你只是需要被温柔接住而已。',
        '把肩膀放松一点，世界不会因为你慢半拍就塌下来。',
        '我在这儿听着呢，慢慢来，不着急。',
        '给自己倒杯热水，像照顾好朋友那样照顾自己。',
      ];

      var REPLIES_CELEBRATE = [
        '这股能量太顶了！趁热打铁，把开心存进回忆里！',
        '值得庆祝！今天你就是自己的 MVP！',
        '好运是努力的利息，你刚才那一下帅爆了！',
        '把这份爽感截图存档，下次低潮时拿出来回血！',
        '开心要大声说出来，宇宙都收到你的信号了！',
        '继续保持，下一段高光正在路上冲过来！',
      ];

      var REPLIES_CAREER = [
        '锦鲤附体，面试与 offer 都在向你靠拢，稳住节奏。',
        '简历已投递宇宙 HR，下一封邮件可能是好消息。',
        '跳槽不是逃跑，是升级地图，你值得更好的副本。',
        '谈薪时记得微笑，你的价值不止一个数字。',
        '职场如排位，先稳住心态，再秀操作。',
        'offer 在路上堵车了，但导航显示终点是你。',
      ];

      var REPLIES_NEUTRAL = [
        '日子像河流，不必急着靠岸，漂着也有风景。',
        '今天没有标准答案，你写下的就是版本更新说明。',
        '小事认真，大事随缘，心会轻一点。',
        '把「以后再说」换成「现在一点点」，就够了。',
        '世界很吵，你听见自己的声音就好。',
        '不必解释太多，沉默里也能长出答案。',
      ];

      function detectTone(text) {
        var s = String(text);
        var lower = s.toLowerCase();
        var i;
        for (i = 0; i < NEGATIVE_KEYS.length; i++) {
          if (s.indexOf(NEGATIVE_KEYS[i]) !== -1) return 'comfort';
        }
        for (i = 0; i < POSITIVE_KEYS.length; i++) {
          if (s.indexOf(POSITIVE_KEYS[i]) !== -1) return 'celebrate';
        }
        for (i = 0; i < CAREER_KEYS.length; i++) {
          if (s.indexOf(CAREER_KEYS[i]) !== -1) return 'career';
        }
        if (lower.indexOf('offer') !== -1) return 'career';
        return 'neutral';
      }

      function pickReplyByTone(tone) {
        var pool;
        if (tone === 'comfort') pool = REPLIES_COMFORT;
        else if (tone === 'celebrate') pool = REPLIES_CELEBRATE;
        else if (tone === 'career') pool = REPLIES_CAREER;
        else pool = REPLIES_NEUTRAL;
        return pool[Math.floor(Math.random() * pool.length)];
      }

      function resolveToneForEntry(item) {
        if (item.tone) return item.tone;
        return detectTone(item.text);
      }

      function relativeTime(iso) {
        var d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        var now = Date.now();
        var sec = Math.floor((now - d) / 1000);
        if (sec < 60) return '刚刚';
        if (sec < 3600) return Math.floor(sec / 60) + ' 分钟前';
        if (sec < 86400) return Math.floor(sec / 3600) + ' 小时前';
        var y = d.getFullYear();
        var m = d.getMonth() + 1;
        var day = d.getDate();
        return y + '/' + m + '/' + day;
      }

      function loadEntries() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          var arr = JSON.parse(raw);
          return Array.isArray(arr) ? arr : [];
        } catch (e) {
          return [];
        }
      }

      function saveEntries(entries) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        } catch (e) {}
      }

      function generateId() {
        return 'm' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
      }

      var moodForm = document.getElementById('moodForm');
      var moodInput = document.getElementById('moodInput');
      var postBtn = document.getElementById('postBtn');
      var moodList = document.getElementById('moodList');

      var entries = loadEntries();
      var pendingTimers = {};

      function findIndexById(id) {
        for (var i = 0; i < entries.length; i++) {
          if (entries[i].id === id) return i;
        }
        return -1;
      }

      function clearPendingTimers(entryId) {
        var p = pendingTimers[entryId];
        if (!p) return;
        if (p.tPhase) clearTimeout(p.tPhase);
        if (p.tDone) clearTimeout(p.tDone);
        delete pendingTimers[entryId];
      }

      function setupLoadingAnimation(entry) {
        var entryId = entry.id;
        clearPendingTimers(entryId);
        var el = document.getElementById('loading-line-' + entryId);
        if (!el) return;
        el.textContent = MSG_ANALYZE;

        var tPhase = setTimeout(function () {
          var node = document.getElementById('loading-line-' + entryId);
          var idx = findIndexById(entryId);
          if (idx === -1 || !node) return;
          if (entries[idx].aiReply != null) return;
          node.textContent = MSG_UNIVERSE;
        }, LOADING_PHASE2_MS);

        var tDone = setTimeout(function () {
          clearPendingTimers(entryId);
          var idx = findIndexById(entryId);
          if (idx === -1) return;
          if (entries[idx].aiReply != null) return;
          var tone = resolveToneForEntry(entries[idx]);
          entries[idx].tone = tone;
          entries[idx].aiReply = pickReplyByTone(tone);
          saveEntries(entries);
          render();
          afterRender();
        }, LOADING_DONE_MS);

        pendingTimers[entryId] = { tPhase: tPhase, tDone: tDone };
      }

      function afterRender() {
        entries.forEach(function (item) {
          if (item.aiReply == null) {
            setupLoadingAnimation(item);
          }
        });
      }

      function render() {
        moodList.innerHTML = '';
        if (entries.length === 0) {
          var empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = '还没有心情，写一条试试吧';
          moodList.appendChild(empty);
          return;
        }

        entries.forEach(function (item, idx) {
          var card = document.createElement('article');
          card.className = 'card';
          card.style.animationDelay = Math.min(idx * 40, 400) + 'ms';

          var del = document.createElement('button');
          del.type = 'button';
          del.className = 'del';
          del.textContent = '删除';
          del.setAttribute('aria-label', '删除这条心情');
          del.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            clearPendingTimers(item.id);
            entries = entries.filter(function (m) {
              return m.id !== item.id;
            });
            saveEntries(entries);
            render();
            afterRender();
          });

          var body = document.createElement('div');
          body.className = 'mood-body';
          body.textContent = item.text;

          var aiBlock = document.createElement('div');
          aiBlock.className = 'ai-block';

          if (item.aiReply == null) {
            var loading = document.createElement('div');
            loading.className = 'ai-loading';
            loading.id = 'loading-line-' + item.id;
            loading.setAttribute('role', 'status');
            loading.textContent = MSG_ANALYZE;
            aiBlock.appendChild(loading);
          } else {
            var reply = document.createElement('div');
            var toneClass = resolveToneForEntry(item);
            reply.className = 'ai-reply tone-' + toneClass;
            reply.textContent = item.aiReply;
            aiBlock.appendChild(reply);
          }

          var meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = relativeTime(item.createdAt);

          card.appendChild(del);
          card.appendChild(body);
          card.appendChild(aiBlock);
          card.appendChild(meta);
          moodList.appendChild(card);
        });
      }

      function postMood(text) {
        var entry = {
          id: generateId(),
          text: text,
          createdAt: new Date().toISOString(),
          aiReply: null,
          tone: detectTone(text),
        };
        entries.unshift(entry);
        saveEntries(entries);
        render();
        afterRender();
      }

      moodForm.addEventListener('submit', function (e) {
        e.preventDefault();
        var val = moodInput.value.replace(/^\s+|\s+$/g, '');
        if (!val) {
          moodInput.focus();
          return;
        }
        postMood(val);
        moodInput.value = '';
        moodInput.focus();
      });

      moodInput.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          postBtn.click();
        }
      });

      function boot() {
        render();
        afterRender();
        moodInput.focus();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>
