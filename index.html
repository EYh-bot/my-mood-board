<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0F1923">
  <title>战术情绪板 · VALORANT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1923;
      --panel: #15202b;
      --text: #ffffff;
      --muted: #b8c5d1;
      --valorant: #ff4655;
      --valorant-dim: #c93542;
      --radius: 4px;
      --font: "Rajdhani", "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: var(--font);
      color: var(--text);
      background: radial-gradient(120% 80% at 50% 0%, #1a2836 0%, var(--bg) 55%);
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 48px max(20px, env(safe-area-inset-right)) 88px max(20px, env(safe-area-inset-left));
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .crosshair {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      color: var(--valorant);
      filter: drop-shadow(0 0 8px rgba(255, 70, 85, 0.45));
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      text-align: center;
      margin: 0 0 28px;
      font-weight: 500;
      letter-spacing: 0.06em;
    }

    .composer {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    textarea {
      width: 100%;
      min-height: 112px;
      padding: 16px 16px;
      border: 1px solid rgba(255, 70, 85, 0.25);
      border-radius: var(--radius);
      background: rgba(15, 25, 35, 0.85);
      font-family: inherit;
      font-size: 17px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text);
      resize: none;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea::placeholder {
      color: rgba(184, 197, 209, 0.55);
    }

    textarea:focus {
      border-color: rgba(255, 70, 85, 0.65);
      box-shadow: 0 0 0 1px rgba(255, 70, 85, 0.35), 0 0 24px rgba(255, 70, 85, 0.12);
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      min-height: 48px;
      border: none;
      border-radius: var(--radius);
      background: var(--valorant);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.14s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      touch-action: manipulation;
      box-shadow: 0 4px 0 #8b1f28, 0 8px 24px rgba(255, 70, 85, 0.25);
    }

    .btn:hover:not(:disabled) {
      background: #ff5e6a;
    }

    .btn:active:not(:disabled) {
      transform: translateY(2px) scale(0.98);
      box-shadow: 0 2px 0 #8b1f28, 0 4px 16px rgba(255, 70, 85, 0.2);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .list {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      position: relative;
      background: var(--panel);
      border-radius: var(--radius);
      padding: 20px 16px 16px;
      opacity: 0;
      transform: translateY(12px);
      border: 1px solid rgba(255, 70, 85, 0.22);
      box-shadow:
        0 0 0 1px rgba(255, 70, 85, 0.08) inset,
        0 12px 40px rgba(0, 0, 0, 0.35);
      animation:
        cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards,
        borderPulse 2.8s ease-in-out 0.45s infinite;
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes borderPulse {
      0%, 100% {
        box-shadow:
          0 0 0 1px rgba(255, 70, 85, 0.12) inset,
          0 0 12px rgba(255, 70, 85, 0.08),
          0 12px 40px rgba(0, 0, 0, 0.35);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(255, 70, 85, 0.35) inset,
          0 0 22px rgba(255, 70, 85, 0.22),
          0 12px 40px rgba(0, 0, 0, 0.35);
      }
    }

    .card:hover .del,
    .card:focus-within .del {
      opacity: 1;
    }

    .del {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 8px 12px;
      min-height: 36px;
      min-width: 56px;
      border: 1px solid rgba(255, 70, 85, 0.35);
      border-radius: 2px;
      background: rgba(15, 25, 35, 0.65);
      color: var(--muted);
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease, color 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
      touch-action: manipulation;
    }

    .del:hover {
      color: var(--text);
      border-color: rgba(255, 70, 85, 0.65);
    }

    .del:active {
      transform: scale(0.96);
    }

    .mood-body {
      font-size: 17px;
      line-height: 1.5;
      font-weight: 600;
      word-break: break-word;
      padding-right: 64px;
      letter-spacing: 0.02em;
    }

    .ai-block {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      min-height: 28px;
    }

    .ai-loading {
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      font-weight: 600;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    .ai-reply {
      font-size: 0.98rem;
      line-height: 1.55;
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .meta {
      margin-top: 12px;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      padding: 36px 16px;
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    @media (max-width: 767.98px) {
      .wrap {
        width: 95%;
        max-width: none;
        padding-top: max(28px, env(safe-area-inset-top));
        padding-bottom: max(72px, env(safe-area-inset-bottom));
      }

      .brand {
        gap: 10px;
      }

      .crosshair {
        width: 32px;
        height: 32px;
      }

      h1 {
        font-size: 1.35rem;
        letter-spacing: 0.1em;
      }

      .subtitle {
        font-size: 1rem;
        margin-bottom: 22px;
      }

      textarea {
        font-size: 18px;
        min-height: 124px;
        padding: 18px 14px;
      }

      .btn {
        font-size: 1.08rem;
        min-height: 52px;
        padding: 16px 20px;
      }

      .composer {
        gap: 16px;
      }

      .mood-body {
        font-size: 18px;
      }

      .ai-loading,
      .ai-reply {
        font-size: 1rem;
      }

      .del {
        opacity: 1;
        font-size: 0.78rem;
        min-height: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <svg class="crosshair" viewBox="0 0 48 48" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
        <circle cx="24" cy="24" r="3.5" fill="currentColor"/>
        <path d="M24 6v8M24 34v8M6 24h8M34 24h8" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
      </svg>
      <h1>战术情绪板</h1>
    </div>
    <p class="subtitle">COMMS LOG · 写下状态，同步战术回应</p>

    <form class="composer" id="moodForm" autocomplete="off">
      <textarea id="moodInput" maxlength="500" rows="4" placeholder="报点：今天手感如何？" aria-label="心情输入" enterkeyhint="send"></textarea>
      <button type="submit" class="btn" id="postBtn">发送战术通讯</button>
    </form>

    <div class="list" id="moodList" aria-live="polite"></div>
  </div>

  <script>
    (function () {
      'use strict';

      var STORAGE_KEY = 'moodboard_valorant_v1';
      var LOADING_PHASE2_MS = 800;
      var LOADING_DONE_MS = 1500;

      var MSG_ANALYZE = '◎ 正在同步战术频道...';
      var MSG_UNIVERSE = '◆ 正在读取雷达情报...';

      var REPLY_TILT = '别破防，下把起个大狙守点，咱们一波 Clutch 回来！';
      var REPLY_WIN = '这就是我们的 Match MVP！直接公屏输入：GGWP！';
      var REPLY_ECO = '这波是 Eco 局，稳住心态，今晚下班回瓦，我给你打闪！';
      var REPLY_TAC_SENSE = '心法别靠玄学，靠「战术直觉」：先听信息再出手，这回合你能 Read 到对面。';

      var KEY_TILT = ['输了', '掉分', '坑'];
      var KEY_WIN = ['赢了', '带飞', 'MVP', 'mvp'];
      var KEY_ECO = ['加班', '累'];
      var KEY_TAC = ['心法', '玄学'];

      var DEFAULT_COMMS = [
        '默认别慌：先清点道具，再谈枪法——战术直觉比运气准。',
        '这回合当 Retake，补位慢一点，别给对面 Timing。',
        '生活也是 Bo3：输一图不算输，调整经济下一分拿下。',
        '听脚步、看小地图，情绪也要「报点」，别闷头硬冲。',
        '今晚回瓦起半甲全道具，现实里先喝水再起立。',
        '别迷信单点玄学，团队交叉火力才是版本答案。',
      ];

      function containsAny(hay, needles) {
        var s = String(hay);
        var i;
        for (i = 0; i < needles.length; i++) {
          if (s.indexOf(needles[i]) !== -1) return true;
        }
        return false;
      }

      function pickComms(text) {
        if (containsAny(text, KEY_TILT)) return { reply: REPLY_TILT, variant: 'tilt' };
        if (containsAny(text, KEY_WIN)) return { reply: REPLY_WIN, variant: 'mvp' };
        if (containsAny(text, KEY_ECO)) return { reply: REPLY_ECO, variant: 'eco' };
        if (containsAny(text, KEY_TAC)) return { reply: REPLY_TAC_SENSE, variant: 'tacsense' };
        return {
          reply: DEFAULT_COMMS[Math.floor(Math.random() * DEFAULT_COMMS.length)],
          variant: 'default',
        };
      }

      function relativeTime(iso) {
        var d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        var now = Date.now();
        var sec = Math.floor((now - d) / 1000);
        if (sec < 60) return '刚刚';
        if (sec < 3600) return Math.floor(sec / 60) + ' 分钟前';
        if (sec < 86400) return Math.floor(sec / 3600) + ' 小时前';
        var y = d.getFullYear();
        var m = d.getMonth() + 1;
        var day = d.getDate();
        return y + '/' + m + '/' + day;
      }

      function loadEntries() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          var arr = JSON.parse(raw);
          return Array.isArray(arr) ? arr : [];
        } catch (e) {
          return [];
        }
      }

      function saveEntries(entries) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        } catch (e) {}
      }

      function generateId() {
        return 'm' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
      }

      var moodForm = document.getElementById('moodForm');
      var moodInput = document.getElementById('moodInput');
      var postBtn = document.getElementById('postBtn');
      var moodList = document.getElementById('moodList');

      var entries = loadEntries();
      var pendingTimers = {};

      function findIndexById(id) {
        for (var i = 0; i < entries.length; i++) {
          if (entries[i].id === id) return i;
        }
        return -1;
      }

      function clearPendingTimers(entryId) {
        var p = pendingTimers[entryId];
        if (!p) return;
        if (p.tPhase) clearTimeout(p.tPhase);
        if (p.tDone) clearTimeout(p.tDone);
        delete pendingTimers[entryId];
      }

      function setupLoadingAnimation(entry) {
        var entryId = entry.id;
        clearPendingTimers(entryId);
        var el = document.getElementById('loading-line-' + entryId);
        if (!el) return;
        el.textContent = MSG_ANALYZE;

        var tPhase = setTimeout(function () {
          var node = document.getElementById('loading-line-' + entryId);
          var idx = findIndexById(entryId);
          if (idx === -1 || !node) return;
          if (entries[idx].aiReply != null) return;
          node.textContent = MSG_UNIVERSE;
        }, LOADING_PHASE2_MS);

        var tDone = setTimeout(function () {
          clearPendingTimers(entryId);
          var idx = findIndexById(entryId);
          if (idx === -1) return;
          if (entries[idx].aiReply != null) return;
          var comms = pickComms(entries[idx].text);
          entries[idx].variant = comms.variant;
          entries[idx].aiReply = comms.reply;
          saveEntries(entries);
          render();
          afterRender();
        }, LOADING_DONE_MS);

        pendingTimers[entryId] = { tPhase: tPhase, tDone: tDone };
      }

      function afterRender() {
        entries.forEach(function (item) {
          if (item.aiReply == null) {
            setupLoadingAnimation(item);
          }
        });
      }

      function render() {
        moodList.innerHTML = '';
        if (entries.length === 0) {
          var empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = '暂无通讯记录 · 来一发战术广播';
          moodList.appendChild(empty);
          return;
        }

        entries.forEach(function (item, idx) {
          var card = document.createElement('article');
          card.className = 'card';
          card.style.animationDelay = Math.min(idx * 40, 400) + 'ms';

          var del = document.createElement('button');
          del.type = 'button';
          del.className = 'del';
          del.textContent = '删除';
          del.setAttribute('aria-label', '删除这条心情');
          del.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            clearPendingTimers(item.id);
            entries = entries.filter(function (m) {
              return m.id !== item.id;
            });
            saveEntries(entries);
            render();
            afterRender();
          });

          var body = document.createElement('div');
          body.className = 'mood-body';
          body.textContent = item.text;

          var aiBlock = document.createElement('div');
          aiBlock.className = 'ai-block';

          if (item.aiReply == null) {
            var loading = document.createElement('div');
            loading.className = 'ai-loading';
            loading.id = 'loading-line-' + item.id;
            loading.setAttribute('role', 'status');
            loading.textContent = MSG_ANALYZE;
            aiBlock.appendChild(loading);
          } else {
            var reply = document.createElement('div');
            reply.className = 'ai-reply';
            reply.textContent = item.aiReply;
            aiBlock.appendChild(reply);
          }

          var meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = relativeTime(item.createdAt);

          card.appendChild(del);
          card.appendChild(body);
          card.appendChild(aiBlock);
          card.appendChild(meta);
          moodList.appendChild(card);
        });
      }

      function postMood(text) {
        var entry = {
          id: generateId(),
          text: text,
          createdAt: new Date().toISOString(),
          aiReply: null,
        };
        entries.unshift(entry);
        saveEntries(entries);
        render();
        afterRender();
      }

      moodForm.addEventListener('submit', function (e) {
        e.preventDefault();
        var val = moodInput.value.replace(/^\s+|\s+$/g, '');
        if (!val) {
          moodInput.focus();
          return;
        }
        postMood(val);
        moodInput.value = '';
        moodInput.focus();
      });

      moodInput.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          postBtn.click();
        }
      });

      function boot() {
        render();
        afterRender();
        moodInput.focus();
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>
